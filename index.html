<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Akbar Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    background: #0a0f1e;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  

  .chat-container {
    position: relative;
    z-index: 10;
    width: 95%;
    max-width: 500px;
    height: 92vh;
    max-height: 780px;
    display: flex;
    flex-direction: column;
    border-radius: 28px;
    overflow: hidden;
    background: linear-gradient(145deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow:
      0 0 0 1px rgba(0,180,255,0.1),
      0 30px 80px rgba(0,0,0,0.6),
      0 0 60px rgba(0,120,255,0.08),
      inset 0 1px 0 rgba(255,255,255,0.12);
  }

  .header {
    padding: 18px 20px;
    background: linear-gradient(135deg, rgba(0,100,200,0.4) 0%, rgba(0,60,140,0.3) 100%);
    border-bottom: 1px solid rgba(0,180,255,0.15);
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,200,255,0.6), transparent);
  }

  .avatar {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, #0055cc, #00aaff);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 20px rgba(0,150,255,0.5), 0 0 40px rgba(0,100,255,0.2);
    border: 2px solid rgba(0,200,255,0.4);
    flex-shrink: 0;
    animation: pulse-glow 3s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%,100% { box-shadow: 0 0 20px rgba(0,150,255,0.5), 0 0 40px rgba(0,100,255,0.2); }
    50% { box-shadow: 0 0 30px rgba(0,200,255,0.7), 0 0 60px rgba(0,150,255,0.3); }
  }

  .header-info { flex: 1; }
  .header-name {
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.3px;
    text-shadow: 0 0 20px rgba(0,200,255,0.5);
  }
  .header-sub {
    color: rgba(150,210,255,0.75);
    font-size: 12px;
    margin-top: 2px;
  }

  .status-badge {
    display: flex; align-items: center; gap: 6px;
    background: rgba(0,255,100,0.1);
    border: 1px solid rgba(0,255,100,0.2);
    border-radius: 20px;
    padding: 4px 10px;
    flex-shrink: 0;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 8px #00ff88;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .status-text { color: #00ff88; font-size: 11px; font-weight: 500; }

  /* API Key Banner */
  .key-banner {
    background: rgba(255,150,0,0.08);
    border-bottom: 1px solid rgba(255,150,0,0.2);
    padding: 10px 16px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-shrink: 0;
  }
  .key-banner input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,150,0,0.3);
    border-radius: 10px;
    padding: 7px 12px;
    color: #ffd080;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    outline: none;
  }
  .key-banner input::placeholder { color: rgba(255,180,80,0.4); }
  .key-save {
    background: linear-gradient(135deg, #cc7700, #ffaa00);
    border: none;
    color: #000;
    border-radius: 10px;
    padding: 7px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .key-save:hover { transform: scale(1.04); box-shadow: 0 0 16px rgba(255,150,0,0.4); }
  .key-label {
    color: rgba(255,180,80,0.8);
    font-size: 12px;
    white-space: nowrap;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scrollbar-width: thin;
    scrollbar-color: rgba(0,150,255,0.3) transparent;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: rgba(0,150,255,0.3); border-radius: 4px; }

  .msg-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    animation: msgIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes msgIn {
    from { opacity:0; transform: translateY(16px) scale(0.95); }
    to { opacity:1; transform: translateY(0) scale(1); }
  }
  .msg-row.user { flex-direction: row-reverse; }

  .bot-icon {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #0055cc, #00aaff);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    box-shadow: 0 0 12px rgba(0,150,255,0.4);
    border: 1px solid rgba(0,200,255,0.3);
  }

  .bubble {
    max-width: 78%;
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.65;
    word-break: break-word;
    white-space: pre-wrap;
  }

  .bubble.bot {
    background: linear-gradient(135deg, rgba(0,80,180,0.25) 0%, rgba(0,50,120,0.2) 100%);
    border: 1px solid rgba(0,150,255,0.2);
    border-radius: 18px 18px 18px 4px;
    color: #d0eaff;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
  }

  .bubble.user {
    background: linear-gradient(135deg, #0066dd, #0099ff);
    border: 1px solid rgba(0,200,255,0.3);
    border-radius: 18px 18px 4px 18px;
    color: #fff;
    box-shadow: 0 4px 20px rgba(0,100,255,0.3);
  }

  .typing-bubble {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 2px;
  }
  .typing-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #00aaff;
    box-shadow: 0 0 8px #00aaff;
    animation: typingBounce 1.2s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce {
    0%,80%,100% { transform:translateY(0); opacity:0.5; }
    40% { transform:translateY(-8px); opacity:1; }
  }

  .quick-wrap {
    padding: 0 16px 12px;
    flex-shrink: 0;
  }
  .quick-label {
    color: rgba(100,170,255,0.6);
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .quick-pills { display: flex; flex-wrap: wrap; gap: 7px; }
  .pill {
    background: rgba(0,100,200,0.15);
    border: 1px solid rgba(0,150,255,0.25);
    color: #80ccff;
    border-radius: 20px;
    padding: 5px 13px;
    font-size: 12.5px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(6px);
  }
  .pill:hover {
    background: rgba(0,150,255,0.3);
    border-color: rgba(0,200,255,0.5);
    color: #fff;
    box-shadow: 0 0 16px rgba(0,150,255,0.3);
    transform: translateY(-1px);
  }

  .input-area {
    padding: 12px 16px 16px;
    border-top: 1px solid rgba(0,150,255,0.1);
    background: rgba(0,20,60,0.3);
    backdrop-filter: blur(10px);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    position: relative;
    flex-shrink: 0;
  }
  .input-area::before {
    content: '';
    position: absolute;
    top: 0; left: 20px; right: 20px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,200,255,0.3), transparent);
  }

  textarea {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(0,150,255,0.2);
    border-radius: 16px;
    padding: 11px 15px;
    color: #d0eaff;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    resize: none;
    outline: none;
    max-height: 100px;
    line-height: 1.5;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  textarea::placeholder { color: rgba(100,160,220,0.5); }
  textarea:focus {
    border-color: rgba(0,200,255,0.5);
    box-shadow: 0 0 20px rgba(0,150,255,0.15);
    background: rgba(255,255,255,0.07);
  }

  .send-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #0055cc, #00aaff);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    box-shadow: 0 0 20px rgba(0,150,255,0.4), 0 4px 12px rgba(0,0,0,0.3);
  }
  .send-btn:hover { transform: scale(1.08); box-shadow: 0 0 30px rgba(0,200,255,0.6); }
  .send-btn:active { transform: scale(0.94); }
  .send-btn:disabled { background: rgba(0,80,150,0.25); box-shadow: none; cursor: not-allowed; transform: none; opacity: 0.45; }
  .send-btn:not(:disabled) { cursor: pointer; }
  .send-btn:not(:disabled):hover { transform: scale(1.08); box-shadow: 0 0 30px rgba(0,200,255,0.6); }
  .send-btn svg { width:18px; height:18px; fill:none; stroke:#fff; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

  .hidden { display: none !important; }
</style>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

<video id="bgVideo" autoplay muted loop playsinline
  style="position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;opacity:0.35;"></video>
<div style="position:fixed;inset:0;z-index:1;background:linear-gradient(135deg,rgba(0,10,30,0.7),rgba(0,20,60,0.6));"></div>

<div class="chat-container">

  <!-- Header -->
  <div class="header">
    <div class="avatar">💧</div>
    <div class="header-info">
      <div class="header-name">Akbar Assistant</div>
      <div class="header-sub">Akbar & Sons Sanitary Store</div>
    </div>
    <div class="status-badge">
      <div class="status-dot"></div>
      <span class="status-text">Online</span>
    </div>
      <button onclick="showKeyBanner()" title="Change API Key" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:5px 9px;color:rgba(255,255,255,0.7);font-size:12px;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'">🔑</button>
  </div>

  <!-- API Key Banner -->
  <div class="key-banner" id="keyBanner">
    <span class="key-label">🔑 Gemini Key:</span>
    <input type="password" id="apiKeyInput" placeholder="Paste your Gemini API key (AIzaSy...)"/>
    <button class="key-save" onclick="saveKey()">Save</button>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="msg-row">
      <div class="bot-icon">💧</div>
      <div class="bubble bot">السلام علیکم! 👋 Welcome to Akbar & Sons Sanitary Store.

I'm Akbar Assistant. I can help you with:
— Product and brand recommendations
— Plumbing guidance
— Store information

How can I help you today?</div>
    </div>
  </div>

  <!-- Quick Questions -->
  <div class="quick-wrap" id="quickWrap">
    <div class="quick-label">Quick Questions</div>
    <div class="quick-pills">
      <button class="pill" onclick="sendQuick(this)">What pipe brands do you recommend?</button>
      <button class="pill" onclick="sendQuick(this)">Which taps are best?</button>
      <button class="pill" onclick="sendQuick(this)">Tell me about water tanks</button>
      <button class="pill" onclick="sendQuick(this)">What showers do you carry?</button>
      <button class="pill" onclick="sendQuick(this)">Toilet shower options?</button>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <textarea id="userInput" rows="1" placeholder="Ask about products, brands, plumbing…"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>

</div>

<script>
const SYSTEM_PROMPT = `You are Akbar Assistant, a friendly, professional, and knowledgeable FAQ chatbot for Akbar & Sons Sanitary Store, a sanitary and plumbing supplies store in Pakistan.

Your Responsibilities:
Help customers with product inquiries (PPRC pipes, PVC pipes, fittings, taps, showers, toilet showers, basins, toilets, water tanks, etc.), brand recommendations, general price range guidance in PKR, store information, basic plumbing guidance, product comparisons, and helping customers choose the right product.

Brand Recommendations:

Sanitary Fittings (PPRC and PVC): Always recommend Popular, TurkPlast, IIL, and Dura Flow. Then add: The best choice depends on your budget and requirements. All of these brands offer reliable quality at different price points. Visit Akbar & Sons or contact us for personalized guidance.

Taps: Always recommend Master, Faisal, JIJ, and SuperMaster. Then add: The best choice depends on your budget and preferred design. All of these brands provide good quality and durability.

Water Tanks: Always recommend Suntuff and Dura Flow, both come with a 5-year warranty. Then add: Both options offer dependable quality and long-lasting performance. Contact us to find the right size for your needs.

Showers: Always recommend Faisal, JIJ, and SuperMaster. Then add: Each brand offers reliable quality and attractive designs suitable for different budgets.

Toilet Showers: Always recommend Master, Faisal, Decent Master (6-month warranty), and Super Winner (3-month warranty). Then add: The best option depends on your budget and usage requirements.

Pricing Guidelines: Never provide exact prices. If asked, say: Prices may vary depending on the product, brand, and market conditions. Please visit Akbar & Sons or contact us for the latest pricing information.

Stock Availability: Never claim a product is in stock. If asked, say: Stock availability changes regularly. Please contact Akbar & Sons directly for the latest stock information.

Tone: Always be friendly, polite, professional, helpful, and simple.

Owner and Business Information:
Akbar & Sons Sanitary Store is owned and managed by Mr. M. Aleem, who has been running this business since 1994. With over 30 years of experience in the sanitary and plumbing industry, Mr. Aleem has built a reputation for quality products and trusted customer service.

Akbar & Sons is an authorized dealer of several leading brands including Popular, Dura Flow, TurkPlast, Faisal, and IIL. Authorization certificates from these companies are available and can be provided to customers personally upon request.

The business is officially registered with the Government of Pakistan and is a registered tax payer, ensuring that all transactions are legitimate, transparent, and trustworthy.

Store Information:

Location: Akbar & Sons Sanitary Store is located in Main Defence, Ghazi Road, near Jamia Masjid Sadiqia, Ferozpur Road, Lahore.

Contact: You can reach us by phone or WhatsApp at 0321-1306560.

Business Hours:
- Monday to Saturday: 9:00 AM to 9:00 PM
- Sunday: 9:00 AM to 3:00 PM
- Friday: Open as usual but closed for prayer break from 12:30 PM to 2:30 PM

Delivery Information:
- Within Lahore: Same-day delivery is available.
- Outside Lahore: Delivery takes 3 to 4 business days. Delivery charges vary depending on the location.

Payment Methods:
- For new customers, the first 5 orders must be paid online.
- After 5 successful orders, Cash on Delivery (COD) becomes available.

Additional Products:
Apart from sanitary and plumbing supplies, Akbar & Sons also carries manholes, folding ladders, main door locks, and other related hardware items. If you are looking for a specific product, feel free to contact us and we will let you know if it is available.

Out-of-Scope: If unrelated to sanitary products, plumbing, or Akbar & Sons, say: That is a bit outside what I can help with here. Please visit Akbar & Sons directly or contact us at 0321-1306560.

Important Rules:
- NEVER use asterisks (*) or double asterisks (**) anywhere in your responses.
- Do not use any markdown formatting like bold or italic.
- Use plain text only. Use dashes (-) or numbers for lists.
- Keep responses concise and easy to read.
- Always guide customers toward visiting or contacting the store.`;

let apiKey = localStorage.getItem('gemini_api_key') || '';
let history = [];
let isLoading = false;
let messageCount = 0;
let usedQuickQuestion = false;

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const keyBanner = document.getElementById('keyBanner');
const quickWrap = document.getElementById('quickWrap');
const apiKeyInput = document.getElementById('apiKeyInput');

// Only show banner if no key saved
if (apiKey) {
  localStorage.setItem('gemini_api_key', val);
  keyBanner.classList.add('hidden');
  sendBtn.disabled = false;
} else {
  keyBanner.classList.remove('hidden');
  sendBtn.disabled = true;
}

inputEl.addEventListener('input', () => {
  sendBtn.disabled = !inputEl.value.trim() || isLoading;
});

function showKeyBanner() {
  keyBanner.classList.remove('hidden');
  apiKeyInput.focus();
}

function saveKey() {
  const val = apiKeyInput.value.trim();
  if (!val) { alert('Please paste your Gemini API key first!'); return; }
    // Accept any Gemini key format
  if (val.length < 20) {
    alert('Key too short. Please paste your full Gemini API key.');
    return;
  }
  apiKey = val;
  localStorage.setItem('gemini_api_key', val);
  keyBanner.classList.add('hidden');
  sendBtn.disabled = !inputEl.value.trim();
  inputEl.focus();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) sendMessage();
  }
}

function sendQuick(btn) {
  inputEl.value = btn.textContent;
  quickWrap.classList.add('hidden');
  usedQuickQuestion = true;
  sendMessage();
}

function addMessage(role, text) {
  const row = document.createElement('div');
  row.className = 'msg-row' + (role === 'user' ? ' user' : '');

  if (role === 'bot') {
    const icon = document.createElement('div');
    icon.className = 'bot-icon';
    icon.textContent = '💧';
    row.appendChild(icon);
  }

  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + role;
  bubble.textContent = text;
  row.appendChild(bubble);

  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row';
  row.id = 'typingRow';
  const icon = document.createElement('div');
  icon.className = 'bot-icon';
  icon.textContent = '💧';
  row.appendChild(icon);
  const bubble = document.createElement('div');
  bubble.className = 'bubble bot';
  bubble.innerHTML = '<div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingRow');
  if (t) t.remove();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading || !apiKey) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  quickWrap.classList.add('hidden');
  isLoading = true;

  addMessage('user', text);
  history.push({ role: 'user', content: text });
  messageCount++;

  showTyping();

  try {
    const res = await fetch(
      'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent',
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
          contents: history.map(m => ({
            role: m.role === 'assistant' ? 'model' : 'user',
            parts: [{ text: m.content }]
          })),
          generationConfig: { maxOutputTokens: 800, temperature: 0.7 }
        })
      }
    );

    const data = await res.json();
    console.log('API Response:', JSON.stringify(data));
    console.log('HTTP Status:', res.status);

    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    if (!res.ok) throw new Error('HTTP ' + res.status);

    let reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Sorry, I could not get a response. Please try again.';
    reply = reply.replace(/\*+/g, '');

    removeTyping();
    addMessage('bot', reply);
    history.push({ role: 'assistant', content: reply });
    // Show quick questions after 1st bot reply only if customer typed (not used quick pill)
    if (messageCount === 1 && !usedQuickQuestion) {
      quickWrap.classList.remove('hidden');
    }

  } catch (err) {
    removeTyping();
    let errMsg = '';
    const msg = err.message || '';
    console.error('API Error:', msg);
    if (msg.includes('quota') || msg.includes('limit') || msg.includes('RESOURCE_EXHAUSTED')) {
      errMsg = 'I am currently unavailable due to high usage. Please try again after 1:00 PM Pakistan time when the quota resets. You can also contact us directly at 0321-1306560.';
    } else if (msg.includes('demand') || msg.includes('overload') || msg.includes('503') || msg.includes('529')) {
      errMsg = 'Our assistant is experiencing high demand right now. Please try again in a few seconds or contact Akbar & Sons at 0321-1306560.';
    } else if (msg.includes('API_KEY') || msg.includes('auth') || msg.includes('401') || msg.includes('403')) {
      errMsg = 'There seems to be a configuration issue. Please contact Akbar & Sons at 0321-1306560 for assistance.';
    } else if (msg.includes('network') || msg.includes('fetch') || msg.includes('Failed')) {
      errMsg = 'Unable to connect. Please check your internet connection and try again.';
    } else {
      errMsg = 'Sorry, I am unable to respond at the moment. Please try again or contact Akbar & Sons directly at 0321-1306560.';
    }
    addMessage('bot', errMsg);
  } finally {
    isLoading = false;
    inputEl.disabled = false;
    sendBtn.disabled = !inputEl.value.trim();
    inputEl.focus();
  }
}
</script>
<script>
  // HLS Video Background
  const video = document.getElementById('bgVideo');
  const videoSrc = 'https://stream.mux.com/Kec29dVyJgiPdtWaQtPuEiiGHkJIYQAVUJcNiIHUYeo.m3u8';

  if (Hls.isSupported()) {
    const hls = new Hls({ autoStartLoad: true });
    hls.loadSource(videoSrc);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      video.play();
    });
    // Restart when ended
    video.addEventListener('ended', () => {
      hls.stopLoad();
      hls.loadSource(videoSrc);
      hls.startLoad();
      video.play();
    });
    // Handle stall - restart if stuck
    video.addEventListener('stalled', () => {
      video.play();
    });
    video.addEventListener('pause', () => {
      video.play();
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = videoSrc;
    video.play();
    video.addEventListener('ended', () => {
      video.currentTime = 0;
      video.play();
    });
    video.addEventListener('pause', () => {
      video.play();
    });
  }
</script>
</body>
</html>
